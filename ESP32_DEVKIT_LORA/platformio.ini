; ============================================================
;  PlatformIO Project Configuration
;  Smart LoRaWAN Gateway — FreeRTOS Edition
;  Target: ESP32 DevKit V1 (38-pin, CP2102 USB-UART chip)
;          Xtensa LX6 dual-core 240 MHz
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev              ; exact match for DevKit V1
framework = arduino

; ── Upload ──────────────────────────────────────────────────
; DevKit V1 uses CP2102 USB-to-UART chip — can handle 921600
; If upload fails, lower to 460800 or 230400
upload_speed  = 921600
monitor_speed = 115200

; Optional: uncomment and set your COM port if auto-detect fails
; upload_port = COM3

; Decodes crash hex addresses → readable function names + line numbers
; Essential when debugging FreeRTOS stack overflows
monitor_filters = esp32_exception_decoder

; ── Flash ───────────────────────────────────────────────────
board_build.flash_size    = 4MB
board_build.flash_mode    = qio   ; ESP32 DevKit V1 default — faster than dio
board_upload.flash_size   = 4MB
board_upload.maximum_size = 4194304
board_build.partitions    = default.csv

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -D CORE_DEBUG_LEVEL=0          ; 0=silent in production
    -D CONFIG_FREERTOS_UNICORE=0   ; CRITICAL: enables both Core 0 + Core 1
                                   ; Without this, xTaskCreatePinnedToCore()
                                   ; to Core 0 may silently fail

; NOTE: No ARDUINO_USB_MODE or ARDUINO_USB_CDC_ON_BOOT needed.
; Those flags are only for ESP32-S3/S2 with native USB.
; DevKit V1 uses CP2102 UART bridge — Serial works out of the box.

; ── Libraries ───────────────────────────────────────────────
lib_deps =
    tzapu/WiFiManager@^2.0.17     ; stable release
